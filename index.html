<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VK Jewellers</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Poppins;
background:#f6efe6;
color:#222;
}

/* NAVBAR */
nav{
display:flex;
align-items:center;
justify-content:space-between;
padding:15px 30px;
background:#f3e6d6;
}

nav div{
flex:1;
}

/* CENTER LOGO */
.logo{
text-align:center;
}

.logo img{
height:70px;
display:block;
margin:auto;
mix-blend-mode:multiply;
}

/* HERO */
.hero{
display:flex;
align-items:center;
justify-content:space-between;
padding:60px 30px;
background:linear-gradient(to right,#caa45f,#e8cfa1);
flex-wrap:wrap;
}

.hero-text{
max-width:500px;
color:white;
}

.hero-text h1{
font-size:45px;
font-family:'Playfair Display';
}

.hero-text p{
font-size:18px;
margin:10px 0;
}

.hero-text button{
padding:12px 25px;
background:#fff;
border:none;
}

/* HERO IMAGE */
.hero img{
width:320px;
border-radius:20px;
margin-top:20px;
}

/* SECTION */
.section{
padding:50px 20px;
text-align:center;
background:#f7efe5;
}

.title{
font-family:'Playfair Display';
font-size:32px;
margin-bottom:30px;
color:#5a4632;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card h3{
padding:10px;
font-size:16px;
}

.card button{
margin-bottom:15px;
padding:8px 20px;
background:#f3e6d6;
border:none;
}

/* ABOUT */
.about{
display:flex;
align-items:center;
gap:30px;
padding:50px 20px;
background:#f3e6d6;
flex-wrap:wrap;
}

.about img{
width:100%;
max-width:300px;
border-radius:20px;
}

.about-text h2{
font-family:'Playfair Display';
font-size:28px;
margin-bottom:10px;
}
</style>
</head>

<body>

<nav>
<div>Home</div>

<div class="logo">
<img src="logo.png" alt="VK Logo">
</div>

<div style="text-align:right;">Contact</div>
</nav>

<section class="hero">

<div class="hero-text">
<h1>Timeless Jewellery</h1>
<p>for Every Occasion</p>
<button>Explore Collections</button>
</div>

<img src="https://images.unsplash.com/photo-1617038220319-276d3cfab638">

</section>

<section class="section">
<h2 class="title">Our Collections</h2>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1611652022419-a9419f74343d">
<h3>Bridal Jewellery</h3>
<button>View Bridal</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f">
<h3>Daily Wear Jewellery</h3>
<button>View Daily Wear</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1603561596112-0a132b757442">
<h3>Gold Heavy Collection</h3>
<button>View Gold</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1617038220319-276d3cfab638">
<h3>Diamond Collection</h3>
<button>View Diamonds</button>
</div>

</div>
</section>

<section class="about">

<img src="https://images.unsplash.com/photo-1617038220319-276d3cfab638">

<div class="about-text">
<h2>Timeless Craftsmanship</h2>
<p>At VK Jewellers, we bring elegance of tradition with modern design.</p>
</div>

</section>

</body>
</html>
