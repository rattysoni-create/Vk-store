<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VK Jewellers</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Georgia', serif;
}

body {
  background: #f8f5f0;
}

/* NAVBAR */
.navbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 15px 40px;
  background: #efe7dc;
  position: sticky;
  top: 0;
}

/* LEFT MENU */
.nav-left {
  display: flex;
  gap: 25px;
}

.nav-left a {
  text-decoration: none;
  color: #5a4634;
  font-size: 16px;
}

/* LOGO CENTER */
.logo {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}

.logo img {
  height: 60px;
  width: auto;
  display: block;
}

/* RIGHT MENU */
.nav-right {
  display: flex;
  align-items: center;
  gap: 20px;
}

.nav-right a {
  text-decoration: none;
  color: #5a4634;
  font-size: 16px;
}

/* ICON STYLE */
.icon {
  font-size: 18px;
  cursor: pointer;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .navbar {
    padding: 10px 20px;
  }

  .nav-left {
    gap: 15px;
  }

  .logo img {
    height: 45px;
  }

  .nav-right {
    gap: 10px;
  }
}
</style>
</head>

<body>

<header class="navbar">

  <!-- LEFT -->
  <div class="nav-left">
    <a href="#">Home</a>
    <a href="#">Collections</a>
  </div>

  <!-- LOGO -->
  <div class="logo">
    <img src="logo.png" alt="VK Jewellers">
  </div>

  <!-- RIGHT -->
  <div class="nav-right">
    <a href="#">Contact</a>
    <span class="icon">🔍</span>
    <span class="icon">🛒</span>
  </div>

</header>

</body>
</html>
