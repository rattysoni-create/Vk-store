<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VK Jewellers</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Poppins;
background:#f6efe6;
color:#333;
}

/* NAVBAR */
nav{
display:grid;
grid-template-columns:1fr auto 1fr;
align-items:center;
padding:12px 40px;
background:#f3e6d6;
}

.nav-left{
justify-self:start;
font-size:16px;
}

.nav-right{
justify-self:end;
font-size:16px;
}

.logo img{
height:55px;
display:block;
}

/* HERO */
.hero{
display:flex;
align-items:center;
justify-content:space-between;
padding:60px 40px;
background:linear-gradient(to right,#caa45f,#e6c79c);
flex-wrap:wrap;
}

.hero-text{
max-width:500px;
color:white;
}

.hero-text h1{
font-size:48px;
font-family:'Playfair Display';
}

.hero-text p{
margin:10px 0;
font-size:18px;
}

.hero-text button{
padding:10px 25px;
background:white;
border:none;
cursor:pointer;
}

/* HERO IMAGE */
.hero img{
width:350px;
border-radius:20px;
}

/* SECTION */
.section{
padding:60px 30px;
text-align:center;
}

.title{
font-family:'Playfair Display';
font-size:34px;
margin-bottom:40px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card h3{
padding:10px;
font-size:16px;
}

.card button{
margin-bottom:15px;
padding:7px 18px;
background:#f3e6d6;
border:none;
}

/* ABOUT */
.about{
display:flex;
align-items:center;
gap:30px;
padding:60px 30px;
flex-wrap:wrap;
background:#f3e6d6;
}

.about img{
width:100%;
max-width:300px;
border-radius:20px;
}

.about-text{
flex:1;
}

.about-text h2{
font-family:'Playfair Display';
font-size:28px;
margin-bottom:10px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
<div class="nav-left">Home</div>

<div class="logo">
<img src="logo.png">
</div>

<div class="nav-right">Contact</div>
</nav>

<!-- HERO -->
<section class="hero">

<div class="hero-text">
<h1>Timeless Jewellery</h1>
<p>For Every Occasion</p>
<button>Explore Collections</button>
</div>

<img src="https://images.unsplash.com/photo-1617038220319-276d3cfab638">

</section>

<!-- COLLECTION -->
<section class="section">
<h2 class="title">Our Collections</h2>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1611652022419-a9419f74343d">
<h3>Bridal Jewellery</h3>
<button>View</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f">
<h3>Daily Wear</h3>
<button>View</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1603561596112-0a132b757442">
<h3>Gold Collection</h3>
<button>View</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1617038220319-276d3cfab638">
<h3>Diamond Collection</h3>
<button>View</button>
</div>

</div>
</section>

<!-- ABOUT -->
<section class="about">

<img src="https://images.unsplash.com/photo-1617038220319-276d3cfab638">

<div class="about-text">
<h2>Timeless Craftsmanship</h2>
<p>At VK Jewellers, we blend tradition with modern elegance.</p>
</div>

</section>

</body>
</html>
